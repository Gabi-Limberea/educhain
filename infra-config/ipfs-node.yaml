apiVersion: v1
kind: Pod
metadata:
  name: ipfs-node
  labels:
    app: ipfs
spec:
  containers:
    - name: ipfs
      image: ipfs/kubo:v0.35.0
      ports:
        - containerPort: 4001
          name: udp-port
          protocol: UDP
        - containerPort: 8080
          name: gateway-port
          protocol: TCP
        - containerPort: 5001
          name: rpc-port
          protocol: TCP
      volumeMounts:
      - name: ipfs-data
        mountPath: /data/ipfs
  volumes:
    - name: ipfs-data
      persistentVolumeClaim:
        claimName: ipfs-data-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: ipfs-node
  labels:
    app: ipfs
spec:
  selector:
    app: ipfs
  ports:
    - name: rpc-port
      port: 5001
      targetPort: 5001
    - name: udp-port
      port: 4001
      targetPort: 4001
    - name: gateway-port
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ipfs-data-pvc
spec:
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
